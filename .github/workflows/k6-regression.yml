name: Performance & Regression Testing CI

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Smoke Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/smoke/health-check.js

  load-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Load Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/load/get-booking.js

  regression-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Regression Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/regression/booking-crud.js
